<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grade Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Grade Tracker 🎓</h1>

<div class="tracker">
    <input type="text" id="subject" placeholder="Subject">
    <input type="number" id="grade" placeholder="Grade">

    <button onclick="addGrade()">Add</button>

    <ul id="list"></ul>

    <h2>Average: <span id="average">0</span></h2>
</div>

<script src="script.js"></script>
</body>
</html>
